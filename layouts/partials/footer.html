<!-- Show the Buy Me a Coffee widget only when the footer is visible -->
<script>
    const observer = new IntersectionObserver((entries) => {
        const btn = document.getElementById("bmc-wbtn");
        if (!btn) return;
        btn.classList.toggle("bmc-visible", entries[0].isIntersecting);
    });
    observer.observe(document.querySelector("footer"));
</script>
