<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en-us" }}">

<head>
  {{ partial "head" . }}
</head>

<body id="fullsingle" class="{{- if (eq .Kind `home`) -}}
{{- print "page-template-page-fullsingle-split" -}}
{{- else -}}
{{- print "page-template-blog-fullsingle" -}}
{{- end -}}
">

  {{- if (ne .Kind `home`) }}
  {{- partialCached "header.html" . .Page }}
  {{- end }}

  {{- block "main" . }}{{ end }}

</body>
</html>
